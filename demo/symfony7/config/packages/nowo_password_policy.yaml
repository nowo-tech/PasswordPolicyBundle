# Demo configuration for Nowo Password Policy Bundle.
# See docs/examples/ for additional expiry flash and cache setups.

nowo_password_policy:
    # Per-entity policy: each class implementing HasPasswordPolicyInterface gets its own rules.
    entities:
        App\Entity\User:
            # Entity property holding the hashed password (monitored for changes).
            password_field: password
            # Collection field storing previous password hashes (PasswordHistoryInterface).
            password_history_field: passwordHistory
            # Number of past passwords kept to block reuse.
            passwords_to_remember: 5
            # Days until password expiry (user is notified or redirected).
            expiry_days: 90
            # Fallback route name for password reset redirect.
            reset_password_route_name: demo_home
            # Routes where expiry is enforced (empty = none). Supports literals, globs, and PCRE.
            notified_routes:
                - demo_home
            # Routes excluded from expiry checks (e.g. login/logout).
            excluded_notified_routes:
                - login
                - logout

    # Listener that checks password expiry on each request.
    expiry_listener:
        # Kernel event priority (higher runs earlier).
        priority: 0
        # If true, redirect to reset_password_route_name when expired; otherwise flash only.
        redirect_on_expiry: false
        # Flash frequency: always | once_per_session | interval | never
        flash_strategy: always
        # Throttle storage for once_per_session/interval: session | cache
        flash_throttle_storage: session
        error_msg:
            text:
                # Translation keys for the expiry flash (see Resources/translations/).
                title: nowo_password_policy.title
                message: nowo_password_policy.message
            # Flash type: error, warning, info, or success.
            type: error

        # --- flash_strategy examples (uncomment one block; see docs/examples/expiry-flash-and-cache.yaml) ---
        #
        # once_per_session + session (single node):
        # flash_strategy: once_per_session
        # flash_throttle_storage: session
        #
        # interval + session:
        # flash_strategy: interval
        # flash_interval_minutes: 15
        # flash_throttle_storage: session
        #
        # never (no flash; redirect/event only):
        # flash_strategy: never
        #
        # once_per_session + Redis (requires cache.yaml Redis + REDIS_URL):
        # flash_strategy: once_per_session
        # flash_throttle_storage: cache
        # flash_throttle_cache_service: cache.app
        # flash_throttle_cache_ttl: 86400
        #
        # once_per_session + Memcached (requires cache.yaml Memcached + MEMCACHED_URL):
        # flash_strategy: once_per_session
        # flash_throttle_storage: cache
        # flash_throttle_cache_service: cache.app
        # flash_throttle_cache_ttl: 86400
        #
        # interval + dedicated Redis pool cache.password_policy.flash_throttle:
        # flash_strategy: interval
        # flash_interval_minutes: 30
        # flash_throttle_storage: cache
        # flash_throttle_cache_service: cache.password_policy.flash_throttle
        # flash_throttle_cache_ttl: 86400
        #
        # custom service:
        # flash_strategy: once_per_session
        # flash_throttle_storage_service: App\Security\ExpiryFlashThrottleStorage

    # Log password policy events (expiry, changes, reuse attempts).
    enable_logging: true
    log_level: info

    # Optional caching of expiry checks per user (invalidated on password change).
    # enable_cache: true
    # cache_ttl: 3600
